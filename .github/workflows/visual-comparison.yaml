# This workflow is triggered by the presence of the label 'visual-tests' on a PR.
# The workflow is designed to run visual tests using Playwright on the PR branch by comparing the screenshots with the reference screenshots taken from the default branch.
# The screenshots are compared using the uploaded artifacts generated by the screenshot_capture workflow.
# Upon completion, the workflow generates a visual comparison report that is hosted on GitHub Pages.
# A comment is posted on the PR with the URL to the visual comparison report.
# You can learn more about the visual comparison framework by visiting https://spectrocloud.atlassian.net/wiki/spaces/DE/pages/2184249350/Visual+Testing 


name: Visual Comparison

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Needed for PR comments + pushing to gh-pages
permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: visual-comparison-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # You can keep your existing env vars here; these are sane defaults
  NODE_VERSION: "20"
  # Used to build a unique report folder; we sanitize later for branch names with "/"
  HTML_REPORT_URL_PATH: pr/${{ github.event.pull_request.number || github.run_id }}/${{ github.head_ref || github.ref_name }}
  ARTIFACT_NAME: playwright-html-report
  GH_PAGES_BRANCH: gh-pages

jobs:
  run-ci:
    name: Gate / Info
    runs-on: ubuntu-latest
    steps:
      - name: Echo context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "pr_number=${{ github.event.pull_request.number }}"
          echo "HTML_REPORT_URL_PATH=${{ env.HTML_REPORT_URL_PATH }}"

  build:
    name: Build + Playwright
    runs-on: ubuntu-latest
    needs: [run-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run build in a way that allows fallback logic to happen
      - name: Build (primary)
        id: build_primary
        continue-on-error: true
        run: |
          set +e
          make build-ci
          exit_code=$?
          echo "BUILD_EXIT_CODE=$exit_code" >> "$GITHUB_ENV"
          echo "build_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      # Example fallback: only run if exit code indicates "cache missing" / special case
      # (You mentioned "5" in your original logic.)
      - name: Build (fallback using cached packs/CVEs)
        if: ${{ steps.build_primary.outputs.build_exit_code == '5' }}
        run: |
          echo "Primary build returned 5, running fallback steps..."
          make build-ci-cached

      - name: Fail if build ultimately failed
        # If primary failed with something other than 0 or the handled 5, fail the job.
        if: ${{ steps.build_primary.outputs.build_exit_code != '0' && steps.build_primary.outputs.build_exit_code != '5' }}
        run: |
          echo "Build failed with exit code ${{ steps.build_primary.outputs.build_exit_code }}"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright visual comparison (sharded)
        # If you truly never want this to fail the workflow, keep `|| true`.
        # If you *do* want failures to fail the workflow, remove `|| true`.
        run: |
          set -e
          npx playwright test --reporter=html || true

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: playwright-report
          if-no-files-found: warn
          retention-days: 14

  create-assets:
    name: Comment on PR with status
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const body = [
              "✅ Visual comparison run completed.",
              "",
              "The HTML report will be published to `gh-pages` by the `publish_report` job (see next job).",
              "If you don't see a link yet, refresh after the workflow finishes."
            ].join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number, body });

  publish_report:
    name: Publish report to gh-pages
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GH_PAGES_BRANCH }}
          fetch-depth: 0

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: _incoming-report

      - name: Prepare destination path (sanitize)
        id: prep
        run: |
          set -e
          RAW_PATH="${{ env.HTML_REPORT_URL_PATH }}"
          SAFE_PATH="$(echo "$RAW_PATH" | sed 's#[^a-zA-Z0-9._/-]#-#g' | sed 's#/#-#g')"
          echo "safe_path=$SAFE_PATH" >> "$GITHUB_OUTPUT"

          DEST="reports/${SAFE_PATH}"
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"

          mkdir -p "$DEST"
          rsync -a --delete "_incoming-report/" "$DEST/"

      - name: Set Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit & push (if changed)
        run: |
          set -e
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Publish visual report for ${{ github.sha }}"
          git push origin "${{ env.GH_PAGES_BRANCH }}"

      - name: Post report URL to PR
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const safePath = "${{ steps.prep.outputs.safe_path }}";
            const reportPath = `reports/${safePath}/index.html`;

            // Best-effort Pages URL: works if Pages is configured for gh-pages.
            // If your org uses a different Pages base, replace this with your known base URL.
            const pagesBase = `https://${owner}.github.io/${repo}`;
            const reportUrl = `${pagesBase}/${reportPath}`;

            const body = [
              "📸 Visual comparison report published:",
              reportUrl
            ].join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: Post failure comment to PR
        if: ${{ github.event_name == 'pull_request' && failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const body = [
              "❌ Visual comparison workflow failed while publishing the report.",
              "Check the `publish_report` job logs for details."
            ].join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number, body });