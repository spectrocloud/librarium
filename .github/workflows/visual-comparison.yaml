# This workflow is triggered by the presence of the label 'visual-tests' on a PR.
# The workflow is designed to run visual tests using Playwright on the PR branch by comparing the screenshots with the reference screenshots taken from the default branch.
# The screenshots are compared using the uploaded artifacts generated by the screenshot_capture workflow.
# Upon completion, the workflow generates a visual comparison report that is hosted on GitHub Pages.
# A comment is posted on the PR with the URL to the visual comparison report.
# You can learn more about the visual comparison framework by visiting https://spectrocloud.atlassian.net/wiki/spaces/DE/pages/2184249350/Visual+Testing 


name: Visual Comparison


on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches-ignore: ["version-*", "docs-rel-*"]


env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PALETTE_API_KEY: ${{ secrets.PALETTE_API_KEY }}
  FULLSTORY_ORGID: ${{ secrets.FULLSTORY_ORGID }}
  ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
  ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
  ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
  ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
  HTML_REPORT_URL_PATH: reports/${{ github.head_ref }}/${{ github.run_id }}/${{ github.run_attempt }}
  DISABLE_PACKS_INTEGRATIONS: ${{ secrets.DISABLE_PACKS_INTEGRATIONS }}
  DISABLE_SECURITY_INTEGRATIONS: ${{ secrets.DISABLE_SECURITY_INTEGRATIONS }}
  SHOW_LAST_UPDATE_TIME: ${{ secrets.SHOW_LAST_UPDATE_TIME }}
  DSO_AUTH_TOKEN: ${{ secrets.DSO_AUTH_TOKEN }}
  SEERS_CMP_KEY: ${{ secrets.SEERS_CMP_KEY }}
  NODE_VERSION: "24"


concurrency:
  group: "visual-comparison-${{ github.workflow }}-${{ github.head_ref }}"
  cancel-in-progress: true


jobs:
  run-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' && contains(github.event.pull_request.labels.*.name, 'visual-tests') }}
    steps:
      # If the condition above is not met, aka, the PR is not in draft status, then this step is skipped.
      # Because this step is part of the critical path, omission of this step will result in remaining CI steps not gettinge executed.
      # As of 8/8/2022, there is no way to enforce this behavior in GitHub Actions CI.
      - name: Log refs
        # Security: pass GitHub context values through env so branch names are logged as data, not shell source text.
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          HTML_REPORT_URL_PATH_VALUE: ${{ env.HTML_REPORT_URL_PATH }}
        run: |
          printf 'GITHUB_BASE_REF: %s\n' "$BASE_REF"
          printf 'GITHUB_HEAD_REF: %s\n' "$HEAD_REF"
          printf 'GITHUB_REF_NAME: %s\n' "$REF_NAME"
          printf 'HTML_REPORT_URL_PATH %s\n' "$HTML_REPORT_URL_PATH_VALUE"
          exit 0



  create-assets:
    name: create-assets
    needs: [run-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 as of May 6, 2026

      - name: Setup Node.js Environment
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 as of May 6, 2026
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Post PR Comment
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8 as of May 6, 2026
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🤖 Starting the visual tests. This will take approximately an hour.`,
            });

      - name: Install Dependencies
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3 as of May 6, 2026
        with: 
            command: npm ci
            attempt_limit: 3
            attempt_delay: 60000 # 1 minute

      - name: Build
        run: |
          touch .env
          make build-ci
      
      - name: Build with cached packs
        if: ${{ env.BUILD_EXIT_CODE == '5' }}
        uses: ./.github/actions/build-cached-packs
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with cached CVEs
        if: ${{ env.BUILD_EXIT_CODE == '7' }}
        uses: ./.github/actions/build-cached-cves
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build
        uses: actions/upload-artifact@v7
        with:
          name: "build"
          path: |
            build/
          if-no-files-found: error
          retention-days: 1



  take-screenshots:
    name: Visual Comparison
    needs: [run-ci, create-assets]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Check out repository code
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 as of May 6, 2026

      - name: Setup Node.js environment
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 as of May 6, 2026
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3 as of May 6, 2026
        with: 
            command: npm ci
            attempt_limit: 3
            attempt_delay: 60000 # 1 minute

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download Build
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3 as of May 6, 2026
        with: 
          attempt_limit: 3
          # Security: pin nested third-party action refs as well; wretry will call this exact commit.
          action: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8 as of May 6, 2026
          with: |
            name: build
            path: build
          attempt_delay: 60000 # 1 minute

      - name: Download Reference Screenshots
        run:  ./scripts/screenshot_artifacts.sh ./screenshots

      - name: Take screenshots with Playwright
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} || exit 0

      - name: Upload blob report to GitHub Actions Artifacts
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7 as of May 6, 2026
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1


  merge-reports:
    name: Merge Reports
    needs: [take-screenshots]
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 as of May 6, 2026

    - name: Setup Node.js environment
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 as of May 6, 2026
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"

    - name: Install Dependencies
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3 as of May 6, 2026
      with: 
          command: npm ci
          attempt_limit: 3
          attempt_delay: 60000 # 1 minute
    
    - name: Download blob reports from GitHub Actions Artifacts
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8 as of May 6, 2026
      with:
        path: all-blob-reports
        pattern: blob-report-*
        merge-multiple: true

    - name: Merge into HTML Report
      run: npx playwright merge-reports --reporter html ./all-blob-reports

    - name: Upload Report
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7 as of May 6, 2026
      id: report
      with:
        name: "report"
        path: |
          playwright-report/
        if-no-files-found: error
        retention-days: 1  


  publish_report:
    name: Publish HTML Report
    needs: [run-ci, take-screenshots, merge-reports]
    runs-on: ubuntu-latest
    continue-on-error: true    
    steps: 

    - name: Checkout GitHub Pages Branch
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 as of May 6, 2026
      with:
        ref: gh-pages  

    - name: Set Git User
          # see: https://github.com/actions/checkout/issues/13#issuecomment-724415212
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Sanitize branch name for path
      # Security: pass untrusted branch names through env and write env values with printf.
      env:
        HEAD_REF: ${{ github.head_ref }}
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
      run: |
        BRANCH_SAFE=$(printf '%s' "$HEAD_REF" | sed 's/\//-/g')
        printf 'BRANCH_SAFE=%s\n' "$BRANCH_SAFE" >> "$GITHUB_ENV"
        printf 'HTML_REPORT_URL_PATH=reports/%s/%s/%s\n' "$BRANCH_SAFE" "$RUN_ID" "$RUN_ATTEMPT" >> "$GITHUB_ENV"

    - name: Download zipped HTML report
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8 as of May 6, 2026
      with:
        name: report
        path: ${{ env.HTML_REPORT_URL_PATH }}

    - name: Push HTML Report
      timeout-minutes: 5
      run: |
        git add .
        git commit -m "workflow: add HTML report for run-id ${{ github.run_id }} (attempt:  ${{ github.run_attempt }})"
        while true; do
          git pull --rebase
          if [ $? -ne 0 ]; then
            echo "Failed to rebase. Please review manually."
            exit 1
          fi

          git push
          if [ $? -eq 0 ]; then
            echo "Successfully pushed HTML report to repo."
            exit 0
          fi
        done


    - name: DNS Wait
      run:  sleep 120

        
    - name: GH Pages URL
      run: |
        echo "::notice title= Published Playwright Test Report::https://spectrocloud.github.io/librarium/$HTML_REPORT_URL_PATH"


    - name: GH Pages URL
      run: |
        echo "::notice title= Published Playwright Test Report::https://spectrocloud.github.io/librarium/$HTML_REPORT_URL_PATH"

    - name: Post Report URL Comment
      # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8 as of May 6, 2026
      with:
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: `📋 Visual Report for branch ${{ github.head_ref }} with CI run ${{ github.run_id }} and attempt ${{ github.run_attempt }} is ready at https://spectrocloud.github.io/librarium/${{env.HTML_REPORT_URL_PATH}}

            💡 You may have to wait for DNS to resolve or the GitHub Pages job to complete. You can view the progress of the GitHub Pages job [here](https://github.com/spectrocloud/librarium/actions/workflows/pages/pages-build-deployment).`,
          });