# This file is responsible for running the CI checks on every PR that is opened, synchronized, reopened, or ready for review.
# The CI checks are run in parallel and include the following steps:
# 1. Writing checks using Vale
# 2. Check code formatting using Prettier
# 3. Build the site
# In the event a prettier commit is required
# This is a required workflow that must succeed before a PR can be merged.
# Version branches are excluded from this workflow.

name: Pre-merge Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches-ignore: ["version-*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

  

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  APPZI_TOKEN: ${{ secrets.APPZI_TOKEN }}
  FULLSTORY_ORGID: ${{ secrets.FULLSTORY_ORGID }}
  ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
  ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
  ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
  ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
  PALETTE_API_KEY: ${{ secrets.PALETTE_API_KEY }}
  DISABLE_PACKS_INTEGRATIONS: ${{ secrets.DISABLE_PACKS_INTEGRATIONS }}
  DISABLE_SECURITY_INTEGRATIONS: ${{ secrets.DISABLE_SECURITY_INTEGRATIONS }}
  SHOW_LAST_UPDATE_TIME: ${{ secrets.SHOW_LAST_UPDATE_TIME }}
  DSO_AUTH_TOKEN:  ${{ secrets.DSO_AUTH_TOKEN }}
  SEERS_CMP_KEY: ${{ secrets.SEERS_CMP_KEY }}
  NODE_VERSION: "24"

jobs:
  run-ci:
    # runs-on: ubuntu-latest
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' }}
    steps:
      # If the condition above is not met, aka, the PR is not in draft status, then this step is skipped.
      # Because this step is part of the critical path, omission of this step will result in remaining CI steps not gettinge executed.
      # As of 8/8/2022 there is now way to enforce this beahvior in GitHub Actions CI.
      - run: exit 0

  vale:
    name: Writing Checks
    needs: [run-ci]
    uses: spectrocloud/spectro-vale-pkg/.github/workflows/vale.yml@main

  prettier:
    name: Check Code Formatting
    needs: [run-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve Credentials
        id: import-secrets
         # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0 as of May 6, 2026
        with:
          url: https://vault.prism.spectrocloud.com
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          # Security: keep Vault secrets scoped to this step's outputs instead of exporting them to every later step.
          exportEnv: false
          secrets: /providers/github/organizations/spectrocloud/token?org_name=spectrocloud token | VAULT_GITHUB_TOKEN

      - name: Checkout Repository
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 as of May 6, 2026
        with:
          token: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Setup Node.js environment
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 as of May 6, 2026
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Auto Format (Prettier)
        run: make format

      - name: Commit Changes
        uses: ./.github/actions/commit-changes
        with:
          method: git
          token: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}
          commit_message: "ci: auto-formatting prettier issues"
          file_regex: ".*"

  build:
    name: Build
    needs: [run-ci, prettier]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 as of May 6, 2026

      - name: Setup Node.js environment
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 as of May 6, 2026
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Build
        run: |
          touch .env
          make build-ci

      - name: Build with cached packs
        if: ${{ env.BUILD_EXIT_CODE == '5' }}
        uses: ./.github/actions/build-cached-packs
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build with cached CVEs
        if: ${{ env.BUILD_EXIT_CODE == '7' }}
        uses: ./.github/actions/build-cached-cves
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Post PR Comment (success)
        if: ${{ github.event_name == 'pull_request' && success() }}
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v8 as of May 6, 2026
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const issue_number =  Number(process.env.PR_NUMBER || context.payload.pull_request?.number || context.issue?.number);
            if (!issue_number) {
              core.info("No PR number in context; skipping PR comment.");
              return;
            }
            const body = `✅ CI checks passed for commit ${{ github.sha }}.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });

      - name: Post PR Comment (failure)
        if: ${{ github.event_name == 'pull_request' && failure() }}
        # Security: pin third-party actions to immutable commits; keep the original version in the comment for Dependabot/reviewers.
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v8 as of May 6, 2026
        with:
          script: |
            const issue_number = Number(process.env.PR_NUMBER || context.payload.pull_request?.number || context.issue?.number);
            if (!issue_number) {
              core.info("No PR number in context; skipping PR comment.");
              return;
            }
            const body = `❌ CI checks failed for commit ${{ github.sha }}.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });